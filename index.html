<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var p = window.location.search.match(/p=([^&]*)/);
        if (p) {
          window.history.replaceState(null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') + '/' +
            p[1].replace(/~and~/g, '&') +
            (window.location.search.match(/q=([^&]*)/) ? '?' + window.location.search.match(/q=([^&]*)/)[1].replace(/~and~/g, '&') : '') +
            window.location.hash
          );
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>КиноТГ — Фильмы и сериалы</title>
    <meta name="description" content="Премиум стриминговое приложение для Telegram" />
    <meta property="og:title" content="КиноТГ" />
    <meta property="og:description" content="Смотрите фильмы и сериалы с умными рекомендациями" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
